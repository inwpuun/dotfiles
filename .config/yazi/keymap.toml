[manager]
prepend_keymap = [
  { on = "m", run = "leave", desc = "Go to parent directory" },
  { on = "n", run = "arrow next", desc = "Move down" },
  { on = "e", run = "arrow prev", desc = "Move up" },
  { on = "i", run = "enter", desc = "Enter directory or open file" },

	{ on = "M", run = "back",    desc = "Back to previous directory" },
	{ on = "N", run = "seek 5",  desc = "Seek down 5 units in the preview" },
	{ on = "E", run = "seek -5", desc = "Seek up 5 units in the preview" },
	{ on = "I", run = "forward", desc = "Forward to next directory" },

  # Linemode
	{ on = [ "h", "s" ], run = "linemode size",        desc = "Linemode: size" },
	{ on = [ "h", "p" ], run = "linemode permissions", desc = "Linemode: permissions" },
	{ on = [ "h", "b" ], run = "linemode btime",       desc = "Linemode: btime" },
	{ on = [ "h", "m" ], run = "linemode mtime",       desc = "Linemode: mtime" },
	{ on = [ "h", "o" ], run = "linemode owner",       desc = "Linemode: owner" },
	{ on = [ "h", "n" ], run = "linemode none",        desc = "Linemode: none" },

  # Find
  { on = "j", run = "find_arrow",              desc = "Next found" },
	{ on = "J", run = "find_arrow --previous",   desc = "Previous found" },

  # Optional: escape key to cancel actions
  { on = "<Esc>", run = "escape", desc = "Cancel or exit" },

  # Add other necessary bindings here (e.g., quit, help, etc.)
  { on = "q", run = "quit", desc = "Quit Yazi" },
  { on = "?", run = "help", desc = "Show help" }
]

[tasks]
prepend_keymap = [
	{ on = "e", run = "arrow prev", desc = "Previous task" },
	{ on = "n", run = "arrow next", desc = "Next task" },
]

[spot]

prepend_keymap = [
	{ on = "e", run = "arrow prev", desc = "Previous line" },
	{ on = "n", run = "arrow next", desc = "Next line" },
	{ on = "m", run = "swipe prev", desc = "Swipe to previous file" },
	{ on = "i", run = "swipe next", desc = "Swipe to next file" },
]

[pick]

prepend_keymap = [
	{ on = "e", run = "arrow prev", desc = "Previous option" },
	{ on = "n", run = "arrow next", desc = "Next option" },
]

[input]

prepend_keymap = [
  # Mode
	{ on = "l", run = "insert",                          desc = "Enter insert mode" },
	{ on = "L", run = [ "move first-char", "insert" ],   desc = "Move to the BOL, and enter insert mode" },

  # Character-wise movement
	{ on = "m",       run = "move -1", desc = "Move back a character" },
	{ on = "i",       run = "move 1",  desc = "Move forward a character" },

  # Word-wise movement
	{ on = "k",     run = "forward --end-of-word",       desc = "Move forward to the end of the current or next word" },
	{ on = "K",     run = "forward --far --end-of-word", desc = "Move forward to the end of the current or next WORD" },
]

[confirm]

prepend_keymap = [
  { on = "e", run = "arrow prev", desc = "Previous line" },
	{ on = "n", run = "arrow next", desc = "Next line" },
]

[help]

prepend_keymap = [
	# Navigation
	{ on = "e", run = "arrow prev", desc = "Previous line" },
	{ on = "n", run = "arrow next", desc = "Next line" },
]
